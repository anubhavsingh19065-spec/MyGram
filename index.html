<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyGram</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .splash { text-align:center; animation: fadeUp .5s ease; }
    .splash-icon { font-size:64px; margin-bottom:16px; animation: iconBounce 1.5s ease-in-out infinite; }
    @keyframes iconBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .splash h1 { font-size:52px; letter-spacing:-2px; margin-bottom:8px; }
    .splash p  { color:var(--muted); font-size:15px; letter-spacing:2px; text-transform:uppercase; }
  </style>
</head>
<body>
  <div class="splash">
    <div class="splash-icon">📸</div>
    <h1 class="logo-font">MyGram</h1>
    <p>Loading your world…</p>
  </div>

  <script src="js/storage.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>

<script>
  seedDemoData();
  setTimeout(() => {
    if (Storage.isLoggedIn()) {
      window.location.href = 'pages/feed.html';
    } else {
      window.location.href = 'pages/login.html';
    }
  }, 800);
</script>
</body>
</html>
