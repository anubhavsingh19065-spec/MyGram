<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyGram — Profile</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div class="topbar-logo logo-font">MyGram</div>
  <nav class="nav-links">
    <a class="nav-link" href="feed.html">🏠 Home</a>
    <a class="nav-link" href="explore.html">🔍 Explore</a>
  </nav>
  <div class="topbar-actions">
    <button class="icon-btn" onclick="window.location.href='feed.html'">←</button>
    <div class="nav-avatar" id="nav-avatar"></div>
  </div>
</div>

<div class="page-wrap" style="max-width:700px">

  <!-- Profile Header -->
  <div class="profile-header">
    <div class="profile-avatar-lg" id="profile-avatar-lg"></div>

    <div style="flex:1">
      <h2 id="profile-username">—</h2>
      <div id="profile-handle">@—</div>
      <div id="profile-bio"></div>

      <div style="display:flex;gap:20px;margin-top:10px">
        <div><b id="profile-post-count">0</b> Posts</div>
        <div><b id="profile-follower-count">0</b> Followers</div>
        <div><b id="profile-following-count">0</b> Following</div>
      </div>

      <div id="profile-actions" style="margin-top:10px"></div>
    </div>
  </div>

  <!-- Edit Bio -->
  <div id="edit-bio-wrap" style="display:none;margin:15px 0">
    <input id="bio-input" placeholder="Enter bio">
    <button onclick="saveBio()">Save</button>
  </div>

  <!-- Posts -->
  <div>
    <h3 id="posts-section-title">Posts</h3>
    <div id="profile-grid"></div>
    <div id="profile-no-posts" style="display:none">No posts</div>
  </div>

</div>

<script src="../js/storage.js"></script>
<!-- <script src="../js/app.js"></script> -->
<script src="../js/posts.js"></script>
<script src="../js/auth.js"></script>

<script>

// ===== USER =====
const params = new URLSearchParams(window.location.search);
const user = params.get("user") || localStorage.getItem("currentUser") || "anonymous";

console.log("Profile user:", user);

// ===== INIT =====
document.addEventListener("DOMContentLoaded", () => {

  document.getElementById("profile-username").textContent = user;
  document.getElementById("profile-handle").textContent = "@" + user;

  const avatar = document.getElementById("profile-avatar-lg");
  if (avatar) {
    avatar.textContent = user.charAt(0).toUpperCase();
    avatar.style.background = "#4f46e5";
  }

  loadProfilePosts();
  loadFollowerCount();
  loadFollowingCount();
});

// ===== POSTS =====
function loadProfilePosts() {
  fetch("https://mygram-1-ek8g.onrender.com/api/posts")
    .then(res => res.json())
    .then(posts => {

      const myPosts = posts.filter(p => p.username === user);

      document.getElementById("profile-post-count").textContent = myPosts.length;

      const grid = document.getElementById("profile-grid");

      if (myPosts.length === 0) {
        document.getElementById("profile-no-posts").style.display = "block";
        grid.innerHTML = "";
        return;
      }

      document.getElementById("profile-no-posts").style.display = "none";

      grid.innerHTML = myPosts.map(p => 
        `<div style="border:1px solid #444;padding:10px;margin:5px">
          ${p.content}
        </div>`
      ).join('');
    });
}

// ===== FOLLOW COUNTS =====
async function loadFollowerCount() {
  const res = await fetch(
    `https://mygram-1-ek8g.onrender.com/api/follow/followers/${user}`
  );
  const data = await res.json();
  document.getElementById("profile-follower-count").textContent = data.length;
}

async function loadFollowingCount() {
  const res = await fetch(
    `https://mygram-1-ek8g.onrender.com/api/follow/following/${user}`
  );
  const data = await res.json();
  document.getElementById("profile-following-count").textContent = data.length;
}

</script>

</body>
</html>
