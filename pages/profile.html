<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyGram — Profile</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div class="topbar-logo logo-font">MyGram</div>
  <nav class="nav-links">
    <a class="nav-link" href="feed.html">🏠 Home</a>
    <a class="nav-link" href="explore.html">🔍 Explore</a>
  </nav>
  <div class="topbar-actions">
    <button class="icon-btn" onclick="window.location.href='feed.html'">←</button>
    <div class="nav-avatar" id="nav-avatar"></div>
  </div>
</div>

<div class="page-wrap" style="max-width:700px">

  <!-- Profile Header -->
  <div class="profile-header">
    <div class="profile-avatar-lg" id="profile-avatar-lg"></div>

    <div style="flex:1">
      <h2 id="profile-username">—</h2>
      <div id="profile-handle">@—</div>
      <div id="profile-bio"></div>

      <div style="display:flex;gap:20px;margin-top:10px">
        <div><b id="profile-post-count">0</b> Posts</div>
        <div><b id="profile-follower-count">0</b> Followers</div>
        <div><b id="profile-following-count">0</b> Following</div>
      </div>

      <div id="profile-actions" style="margin-top:10px"></div>
    </div>
  </div>

  <!-- Edit Bio -->
  <div id="edit-bio-wrap" style="display:none;margin:15px 0">
    <input id="bio-input" placeholder="Enter bio">
    <button onclick="saveBio()">Save</button>
  </div>

  <!-- Posts -->
  <div>
    <h3 id="posts-section-title">Posts</h3>
    <div id="profile-grid"></div>
    <div id="profile-no-posts" style="display:none">No posts</div>
  </div>

</div>

<script src="../js/storage.js"></script>
<!-- <script src="../js/app.js"></script> -->
<script src="../js/posts.js"></script>
<script src="../js/auth.js"></script>

<script>
// requireAuth();

const me = localStorage.getItem("currentUser") || "anonymous";

// FIXED ❗
const params = new URLSearchParams(window.location.search);
const viewUser = params.get('user') || me;
const isOwnProfile = viewUser === me;

// Avatar
const navAv = document.getElementById('nav-avatar');
navAv.textContent = me.charAt(0).toUpperCase();
navAv.style.background = "#4f46e5";

// HEADER
function renderProfileHeader() {
  const userData = Storage.findUser(viewUser) || { username: viewUser, bio: '' };
  const posts = Storage.getPostsByUser(viewUser);
  const followers = Storage.getFollowers(viewUser);
  const following = Storage.getFollowing(viewUser);

  document.getElementById('profile-avatar-lg').textContent = avatarLetter(viewUser);
  document.getElementById('profile-avatar-lg').style.background = avatarColor(viewUser);

  document.getElementById('profile-username').textContent = viewUser;
  document.getElementById('profile-handle').textContent = '@' + viewUser;
  document.getElementById('profile-bio').textContent = userData.bio || '';

  document.getElementById('profile-post-count').textContent = posts.length;
  document.getElementById('profile-follower-count').textContent = followers.length;
  document.getElementById('profile-following-count').textContent = following.length;

  const actions = document.getElementById('profile-actions');

  if (isOwnProfile) {
    actions.innerHTML = `<button onclick="toggleEditBio()">Edit Bio</button>`;
  } else {
    const isFollowing = Storage.isFollowing(me, viewUser);
    actions.innerHTML = 
      `<button onclick="toggleFollow()" id="followBtn">
        ${isFollowing ? 'Following' : 'Follow'}
      </button>`;
  }
}

// FOLLOW
function toggleFollow() {
  const now = Storage.toggleFollow(me, viewUser);
  document.getElementById('followBtn').textContent = now ? 'Following' : 'Follow';
}

// EDIT BIO
function toggleEditBio() {
  const el = document.getElementById('edit-bio-wrap');
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function saveBio() {
  const bio = document.getElementById('bio-input').value;
  const users = Storage.getUsers();
  const i = users.findIndex(u => u.username === me);
  if (i !== -1) {
    users[i].bio = bio;
    Storage.saveUsers(users);
  }

  document.getElementById('profile-bio').textContent = bio;
  document.getElementById('edit-bio-wrap').style.display = 'none';
}

// POSTS
function loadProfile() {
  const user = localStorage.getItem("currentUser") || "anonymous";

  console.log("User:", user);

  document.getElementById("profile-username").innerText = user;

  fetch("https://mygram-1-ek8g.onrender.com/api/posts")
    .then(res => res.json())
    .then(posts => {
      console.log("All posts:", posts);

      const myPosts = posts.filter(p => p.username === user);

      console.log("My posts:", myPosts);

      document.getElementById("profile-post-count").innerText = myPosts.length;
    });
}


function renderProfileGrid() {
  const user = localStorage.getItem("currentUser") || "anonymous";

  fetch("https://mygram-1-ek8g.onrender.com/api/posts")
    .then(res => res.json())
    .then(posts => {
      const myPosts = posts.filter(p => p.username === user);

      const grid = document.getElementById("profile-grid");

      console.log("Rendering posts:", myPosts);

      if (!grid) {
        console.error("profile-grid not found ❌");
        return;
      }

      if (myPosts.length === 0) {
        document.getElementById("profile-no-posts").style.display = "block";
        grid.innerHTML = "";
        return;
      }

      document.getElementById("profile-no-posts").style.display = "none";

      grid.innerHTML = myPosts.map(p => `
        <div style="border:1px solid #444;padding:10px;margin:5px">
          ${p.content}
        </div>
      `).join('');
    });
}


// INIT
loadProfile();
renderProfileGrid();
function deletePost(id) {
  fetch(`https://mygram-1-ek8g.onrender.com/api/posts/${id}`, {
    method: "DELETE"
  })
  .then(() => {
    renderProfileGrid();
    loadProfile(); // update count
  });
}
// ===== BASIC USER =====

// ===== AUTH CHECK (optional) =====
function requireAuth() {
  const user = localStorage.getItem("currentUser");
  if (!user) {
    alert("Login first");
    window.location.href = "login.html";
  }
}

// ===== AVATAR =====
function avatarLetter(name) {
  return name ? name.charAt(0).toUpperCase() : "?";
}

function avatarColor(name) {
  const colors = ["#ff6b6b", "#6bcB77", "#4d96ff", "#feca57"];
  return colors[name.length % colors.length];
}

// ===== SIMPLE TOAST =====
function showToast(msg) {
  alert(msg); // simple for now
}

// ===== FOLLOW (dummy for now) =====
function toggleProfileFollow() {
  alert("Follow feature coming soon");
}

// INIT
renderProfileHeader();
renderProfileGrid();
loadProfile();

</script>

</body>
</html>
