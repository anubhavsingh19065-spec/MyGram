<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyGram — Feed</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>

<!-- ── Topbar ──────────────────────────────────────────── -->
<div class="topbar">
  <div class="topbar-logo logo-font">MyGram</div>

  <nav class="nav-links">
    <a class="nav-link active" href="feed.html">🏠 Home</a>
    <a class="nav-link" href="explore.html">🔍 Explore</a>
  </nav>

  <div class="topbar-actions">
    <button class="icon-btn" onclick="openPostModal()" title="New Post">✏️</button>
    <button class="icon-btn" onclick="showToast('🔔 No new notifications')" title="Notifications">🔔</button>
    <div class="nav-avatar" id="nav-avatar" onclick="goToMyProfile()"></div>
  </div>
</div>

<!-- ── Page ────────────────────────────────────────────── -->
<div class="page-wrap">
  <div class="feed-layout">

    <!-- Feed Column -->
    <div class="feed-col">

      <!-- Stories -->
      <div class="stories-wrap">
        <div class="stories-track" id="stories-track"></div>
      </div>

      <!-- Feed filter tabs -->
      <div class="feed-tabs">
        <button class="feed-tab active" id="tab-all">
        <button class="feed-tab" id="tab-following">
      </div>

      <!-- Create Post Bar -->
      <div class="sidebar-card" style="margin-bottom:16px">
        <div style="display:flex;align-items:center;gap:12px">
          <div id="create-avatar" class="avatar" style="width:40px;height:40px;font-size:16px"></div>
          <button class="form-input" style="cursor:pointer;text-align:left;color:var(--muted);padding:12px 16px" onclick="openPostModal()">
            What's on your mind?
          </button>
          <button class="btn-primary" onclick="publishPost()">Publish Post</button>
        </div>
      </div>

      <!-- Posts -->
      <div id="posts-feed"></div>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar">

      <!-- My Profile Card -->
      <div class="sidebar-card">
        <div class="sidebar-title">My Profile</div>
        <div class="profile-mini">
          <div id="sidebar-avatar" class="avatar" style="width:50px;height:50px;font-size:20px"></div>
          <div class="profile-mini-info">
            <div class="profile-mini-name" id="sidebar-username">—</div>
            <div class="profile-mini-handle" id="sidebar-handle">@—</div>
          </div>
        </div>
        <div class="profile-stats">
          <div class="stat-box">
            <div class="stat-num" id="stat-posts">0</div>
            <div class="stat-label">Posts</div>
          </div>
          <div class="stat-box">
            <div class="stat-num" id="stat-followers">0</div>
            <div class="stat-label">Followers</div>
          </div>
          <div class="stat-box">
            <div class="stat-num" id="stat-following">0</div>
            <div class="stat-label">Following</div>
          </div>
        </div>
        <a href="profile.html" style="display:block;margin-top:12px">
          <button class="btn-outline" style="width:100%">View Profile</button>
        </a>
        <button class="logout-btn" onclick="handleLogout()">← Sign Out</button>
      </div>

      <!-- Suggestions -->
      <div class="sidebar-card">
        <div class="sidebar-title">People to Follow</div>
        <div id="suggestions-list"></div>
      </div>

      <!-- Trending Tags -->
      <div class="sidebar-card">
        <div class="sidebar-title">✦ Trending</div>
        <div class="tag-cloud" id="trending-tags"></div>
      </div>

    </aside>
  </div>
</div>

<!-- ── Post Modal ───────────────────────────────────────── -->
<div class="modal-overlay" id="post-modal" onclick="if(event.target===this)closePostModal()">
  <div class="modal-card">
    <h2 class="modal-title">Share a Moment 📸</h2>
    <p class="modal-sub">What's happening in your world?</p>
    <textarea class="post-textarea" id="post-text" placeholder="Write your story... Use #hashtags to tag your post"></textarea>
    <div class="emoji-row">
      <button class="emoji-pick" onclick="addEmoji('❤️')">❤️</button>
      <button class="emoji-pick" onclick="addEmoji('🔥')">🔥</button>
      <button class="emoji-pick" onclick="addEmoji('🌙')">🌙</button>
      <button class="emoji-pick" onclick="addEmoji('✨')">✨</button>
      <button class="emoji-pick" onclick="addEmoji('🎉')">🎉</button>
      <button class="emoji-pick" onclick="addEmoji('📸')">📸</button>
      <button class="emoji-pick" onclick="addEmoji('🌊')">🌊</button>
      <button class="emoji-pick" onclick="addEmoji('💫')">💫</button>
      <button class="emoji-pick" onclick="addEmoji('🌸')">🌸</button>
      <button class="emoji-pick" onclick="addEmoji('🎵')">🎵</button>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closePostModal()">Cancel</button>
      <button class="btn-primary" style="flex:2;padding:13px" onclick="publishPost()">✨ Publish Post</button>
    </div>
  </div>
</div>

<!-- <script src="../js/storage.js"></script>
<script src="../js/app.js"></script> -->
<script src="../js/auth.js"></script>
<script>

// ✅ USER (GLOBAL)
const user = localStorage.getItem("currentUser") || "anonymous";

// ===== RUN AFTER LOAD =====
document.addEventListener("DOMContentLoaded", () => {

  // NAV AVATAR
  const navAv = document.getElementById("nav-avatar");
  if (navAv) {
    navAv.textContent = user.charAt(0).toUpperCase();
    navAv.style.background = "#4f46e5";
  }

  // SIDEBAR AVATAR
  const sideAv = document.getElementById("sidebar-avatar");
  if (sideAv) {
    sideAv.textContent = user.charAt(0).toUpperCase();
    sideAv.style.background = "#4f46e5";
  }

  // SIDEBAR USER INFO
  document.getElementById("sidebar-username").textContent = user;
  document.getElementById("sidebar-handle").textContent = "@" + user;

  // CREATE AVATAR
  const crAv = document.getElementById("create-avatar");
  if (crAv) {
    crAv.textContent = user.charAt(0).toUpperCase();
    crAv.style.background = "#4f46e5";
  }

  // LOAD POSTS
  renderFeed();

});

// ===== LOAD POSTS =====
function renderFeed() {
  fetch("https://mygram-1-ek8g.onrender.com/api/posts")
    .then(res => res.json())
    .then(posts => {
      const container = document.getElementById("posts-feed");
      container.innerHTML = "";

      posts.reverse().forEach(post => {
        container.innerHTML += `
          <div class="sidebar-card" style="margin-bottom:16px">

            <div style="display:flex;justify-content:space-between;align-items:center">
            <strong>${post.username}</strong>
            ${post.username !== user ? `
            <button onclick="toggleFollow('${post.username}')">
                  Follow
            </button>
            ` : ""}
            </div>
            <p>${post.content}</p>

            <button onclick="deletePost(${post.id})"
              style="margin-top:8px;background:red;color:white;border:none;padding:6px 10px;border-radius:6px">
              🗑 Delete
            </button>

            <button onclick="likePost(${post.id})">
              ❤️ ${post.likes ? post.likes.length : 0}
            </button>

            <div>
              <input id="comment-${post.id}" placeholder="Write comment..." />
              <button onclick="commentPost(${post.id})">Post</button>
            </div>

            <div>
              ${(post.comments || []).map(c =>
                `<p>💬 ${c}</p>`
              ).join("")}
            </div>

          </div>
        `;
      });
    });
}

// ===== LIKE =====
function likePost(id) {
  fetch(`https://mygram-1-ek8g.onrender.com/api/posts/${id}/like`, {
    method: "POST"
  }).then(() => renderFeed());
}

// ===== COMMENT =====
function commentPost(id) {
  const input = document.getElementById(`comment-${id}`);
  const text = input.value.trim();

  if (!text) return;

  fetch(`https://mygram-1-ek8g.onrender.com/api/posts/${id}/comment`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(text)
  }).then(() => {
    input.value = "";
    renderFeed();
  });
}

// ===== CREATE POST =====
function publishPost() {
  const text = document.getElementById("post-text").value.trim();

  if (!text) {
    alert("Write something!");
    return;
  }

  fetch("https://mygram-1-ek8g.onrender.com/api/posts", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      username: user,
      content: text
    })
  })
  .then(res => res.json())
  .then(() => {
    document.getElementById("post-text").value = "";
    closePostModal();
    renderFeed();
  })
  .catch(err => console.error(err));
}

// ===== MODAL =====
function openPostModal() {
  document.getElementById("post-modal").style.display = "flex";
}

function closePostModal() {
  document.getElementById("post-modal").style.display = "none";
}

// ===== EMOJI =====
function addEmoji(emoji) {
  const textarea = document.getElementById("post-text");
  textarea.value += emoji;
  textarea.focus();
}

// ===== DELETE =====
function deletePost(id) {
  if (!confirm("Delete this post?")) return;

  fetch(`https://mygram-1-ek8g.onrender.com/api/posts/${id}`, {
    method: "DELETE"
  })
  .then(() => renderFeed())
  .catch(err => console.error(err));
}
function setFeedTab(type) {
  document.getElementById('tab-all').classList.toggle('active', type === 'all');
  document.getElementById('tab-following').classList.toggle('active', type === 'following');

  // For now just reload all posts
  renderFeed();
}
function goToMyProfile() {
  window.location.href = "profile.html";
}
function loadPostCount() {
  fetch("https://mygram-1-ek8g.onrender.com/api/posts")
    .then(res => res.json())
    .then(posts => {
      const myPosts = posts.filter(p => 
        p.username && user &&
        p.username.trim().toLowerCase() === user.trim().toLowerCase()
      );

      const postEl = document.getElementById("stat-posts");
      if (postEl) postEl.textContent = myPosts.length;
    })
    .catch(err => console.error("Post count error:", err));
}
 loadPostCount();
// ===== FOLLOW SYSTEM =====

// FOLLOW
function followUser(target) {
  fetch("https://mygram-1-ek8g.onrender.com/api/follow", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      follower: user,
      following: target
    })
  }).then(() => renderFeed());
}

// UNFOLLOW
function unfollowUser(target) {
  fetch(`https://mygram-1-ek8g.onrender.com/api/follow?follower=${user}&following=${target}`, {
    method: "DELETE"
  }).then(() => renderFeed());
}

// CHECK FOLLOW
async function isFollowing(target) {
  const res = await fetch(`https://mygram-1-ek8g.onrender.com/api/follow/followers/${target}`);
  const data = await res.json();
  return data.some(f => f.follower === user);
}

// TOGGLE FOLLOW
async function toggleFollow(target) {
  if (target === user) return;

  const following = await isFollowing(target);

  if (following) {
    unfollowUser(target);
  } else {
    followUser(target);
  }
}



</script>
</body>
</html>
