<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyGram — Feed</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>

<!-- ── Topbar ──────────────────────────────────────────── -->
<div class="topbar">
  <div class="topbar-logo logo-font">MyGram</div>

  <nav class="nav-links">
    <a class="nav-link active" href="feed.html">🏠 Home</a>
    <a class="nav-link" href="explore.html">🔍 Explore</a>
  </nav>

  <div class="topbar-actions">
    <button class="icon-btn" onclick="openPostModal()" title="New Post">✏️</button>
    <button class="icon-btn" onclick="showToast('🔔 No new notifications')" title="Notifications">🔔</button>
    <div class="nav-avatar" id="nav-avatar" onclick="goToMyProfile()"></div>
  </div>
</div>

<!-- ── Page ────────────────────────────────────────────── -->
<div class="page-wrap">
  <div class="feed-layout">

    <!-- Feed Column -->
    <div class="feed-col">

      <!-- Stories -->
      <div class="stories-wrap">
        <div class="stories-track" id="stories-track"></div>
      </div>

      <!-- Feed filter tabs -->
      <div class="feed-tabs">
        <button class="feed-tab active" id="tab-all">
        <button class="feed-tab" id="tab-following">
      </div>

      <!-- Create Post Bar -->
      <div class="sidebar-card" style="margin-bottom:16px">
        <div style="display:flex;align-items:center;gap:12px">
          <div id="create-avatar" class="avatar" style="width:40px;height:40px;font-size:16px"></div>
          <button class="form-input" style="cursor:pointer;text-align:left;color:var(--muted);padding:12px 16px" onclick="openPostModal()">
            What's on your mind?
          </button>
          <button class="btn-primary" onclick="publishPost()">Publish Post</button>
        </div>
      </div>

      <!-- Posts -->
      <div id="posts-feed"></div>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar">

      <!-- My Profile Card -->
      <div class="sidebar-card">
        <div class="sidebar-title">My Profile</div>
        <div class="profile-mini">
          <div id="sidebar-avatar" class="avatar" style="width:50px;height:50px;font-size:20px"></div>
          <div class="profile-mini-info">
            <div class="profile-mini-name" id="sidebar-username">—</div>
            <div class="profile-mini-handle" id="sidebar-handle">@—</div>
          </div>
        </div>
        <div class="profile-stats">
          <div class="stat-box">
            <div class="stat-num" id="stat-posts">0</div>
            <div class="stat-label">Posts</div>
          </div>
          <div class="stat-box">
            <div class="stat-num" id="stat-followers">0</div>
            <div class="stat-label">Followers</div>
          </div>
          <div class="stat-box">
            <div class="stat-num" id="stat-following">0</div>
            <div class="stat-label">Following</div>
          </div>
        </div>
        <a href="profile.html" style="display:block;margin-top:12px">
          <button class="btn-outline" style="width:100%">View Profile</button>
        </a>
        <button class="logout-btn" onclick="handleLogout()">← Sign Out</button>
      </div>

      <!-- Suggestions -->
      <div class="sidebar-card">
        <div class="sidebar-title">People to Follow</div>
        <div id="suggestions-list"></div>
      </div>

      <!-- Trending Tags -->
      <div class="sidebar-card">
        <div class="sidebar-title">✦ Trending</div>
        <div class="tag-cloud" id="trending-tags"></div>
      </div>

    </aside>
  </div>
</div>

<!-- ── Post Modal ───────────────────────────────────────── -->
<div class="modal-overlay" id="post-modal" onclick="if(event.target===this)closePostModal()">
  <div class="modal-card">
    <h2 class="modal-title">Share a Moment 📸</h2>
    <p class="modal-sub">What's happening in your world?</p>
    <textarea class="post-textarea" id="post-text" placeholder="Write your story... Use #hashtags to tag your post"></textarea>
    <div class="emoji-row">
      <button class="emoji-pick" onclick="addEmoji('❤️')">❤️</button>
      <button class="emoji-pick" onclick="addEmoji('🔥')">🔥</button>
      <button class="emoji-pick" onclick="addEmoji('🌙')">🌙</button>
      <button class="emoji-pick" onclick="addEmoji('✨')">✨</button>
      <button class="emoji-pick" onclick="addEmoji('🎉')">🎉</button>
      <button class="emoji-pick" onclick="addEmoji('📸')">📸</button>
      <button class="emoji-pick" onclick="addEmoji('🌊')">🌊</button>
      <button class="emoji-pick" onclick="addEmoji('💫')">💫</button>
      <button class="emoji-pick" onclick="addEmoji('🌸')">🌸</button>
      <button class="emoji-pick" onclick="addEmoji('🎵')">🎵</button>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closePostModal()">Cancel</button>
      <button class="btn-primary" style="flex:2;padding:13px" onclick="publishPost()">✨ Publish Post</button>
    </div>
  </div>
</div>

<!-- <script src="../js/storage.js"></script>
<script src="../js/app.js"></script> -->
<script src="../js/auth.js"></script>
<script>

// ===== USER =====
const user = localStorage.getItem("currentUser") || "anonymous";

// ===== INIT =====
document.addEventListener("DOMContentLoaded", () => {
  renderFeed();
  loadPostCount();
  loadFollowerCount();
  loadFollowingCount();

  const navAv = document.getElementById("nav-avatar");
  if (navAv) {
    navAv.textContent = user.charAt(0).toUpperCase();
    navAv.style.background = "#4f46e5";
  }
});
// ===== SIDEBAR PROFILE FIX =====

// avatar
const sideAv = document.getElementById("sidebar-avatar");
if (sideAv) {
  sideAv.textContent = user.charAt(0).toUpperCase();
  sideAv.style.background = "#4f46e5";
}

// username
const sideName = document.getElementById("sidebar-username");
if (sideName) sideName.textContent = user;

// handle
const sideHandle = document.getElementById("sidebar-handle");
if (sideHandle) sideHandle.textContent = "@" + user;

// ===== FEED =====
function renderFeed() {
  fetch("https://mygram-1-ek8g.onrender.com/api/posts")
    .then(res => res.json())
    .then(posts => {

      const container = document.getElementById("posts-feed");
      if (!container) return;

      container.innerHTML = "";

      const reversedPosts = posts.slice().reverse();

      reversedPosts.forEach(post => {
        container.innerHTML += `
          <div class="sidebar-card" style="margin-bottom:16px">

            <div style="display:flex;justify-content:space-between">
              <strong style="cursor:pointer"
                onclick="openUserProfile('${post.username}')">
                ${post.username}
              </strong>

              ${post.username !== user ? 
                `<button id="follow-${post.username}"
                  onclick="toggleFollow('${post.username}')">
                  Follow
                </button>`
               : ""}
            </div>

            <p>${post.content}</p>

            <button onclick="likePost(${post.id})">
              ❤️ ${post.likes ? post.likes.length : 0}
            </button>

          </div>
        `;
      });

      updateFollowButtons(reversedPosts);
    });
}

// ===== LIKE =====
function likePost(id) {
  fetch(`https://mygram-1-ek8g.onrender.com/api/posts/${id}/like`, {
    method: "POST"
  }).then(() => renderFeed());
}

// ===== CREATE POST =====
function publishPost() {
  const text = document.getElementById("post-text").value.trim();

  if (!text) {
    alert("Write something!");
    return;
  }

  fetch("https://mygram-1-ek8g.onrender.com/api/posts", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username: user,
      content: text
    })
  })
  .then(() => {
    document.getElementById("post-text").value = "";
    renderFeed();
  });
}

// ===== FOLLOW =====
function followUser(target) {
  return fetch("https://mygram-1-ek8g.onrender.com/api/follow", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      follower: user,
      following: target
    })
  });
}

function unfollowUser(target) {
  return fetch(`https://mygram-1-ek8g.onrender.com/api/follow?follower=${user}&following=${target}`, {
    method: "DELETE"
  });
}

async function toggleFollow(target) {
  if (target === user) return;

  const res = await fetch(
    `https://mygram-1-ek8g.onrender.com/api/follow/followers/${target}`
  );

  const data = await res.json();
  const isFollowing = data.some(f => f.follower === user);

  if (isFollowing) {
    await unfollowUser(target);
  } else {
    await followUser(target);
  }

  renderFeed();
}

// ===== UPDATE BUTTON =====
async function updateFollowButtons(posts) {
  for (let post of posts) {

    if (post.username === user) continue;

    const res = await fetch(
      `https://mygram-1-ek8g.onrender.com/api/follow/followers/${post.username}`
    );

    const data = await res.json();
    const isFollowing = data.some(f => f.follower === user);

    const btn = document.getElementById(`follow-${post.username}`);

    if (btn) {
      btn.textContent = isFollowing ? "Following" : "Follow";
      btn.style.background = isFollowing ? "#444" : "#4f46e5";
      btn.style.color = "white";
    }
  }
}

// ===== COUNTS =====
function loadPostCount() {
  fetch("https://mygram-1-ek8g.onrender.com/api/posts")
    .then(res => res.json())
    .then(posts => {
      const myPosts = posts.filter(p => p.username === user);
      document.getElementById("stat-posts").textContent = myPosts.length;
    });
}

async function loadFollowerCount() {
  const res = await fetch(
    `https://mygram-1-ek8g.onrender.com/api/follow/followers/${user}`
  );
  const data = await res.json();
  document.getElementById("stat-followers").textContent = data.length;
}

async function loadFollowingCount() {
  const res = await fetch(
    `https://mygram-1-ek8g.onrender.com/api/follow/following/${user}`
  );
  const data = await res.json();
  document.getElementById("stat-following").textContent = data.length;
}

// ===== NAVIGATION =====
function openUserProfile(username) {
  window.location.href = `profile.html?user=${username}`;
}

</script>
</body>
</html>
